services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Spring Boot backend ──────────────────────────────────────────────────
  server:
    build: ./server
    environment:
      # Μέσα στο compose network το hostname της βάσης είναι "db", όχι localhost.
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  # ── React frontend (nginx) ───────────────────────────────────────────────
  client:
    build: ./client
    ports:
      # Host 5173 → container 80. Το 5173 ταιριάζει με το CORS allowed origin
      # του backend (http://localhost:5173), οπότε δεν χρειάζεται αλλαγή κώδικα.
      - "5173:80"
    depends_on:
      - server

volumes:
  pgdata:
