server {
    listen 80;

    # SPA routing: όλα τα paths σερβίρουν το index.html ώστε το
    # React Router να χειρίζεται client-side τις διαδρομές (π.χ. /shop).
    # Χωρίς αυτό, refresh σε /shop θα έδινε 404.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}