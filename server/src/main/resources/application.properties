spring.application.name=server

# DB connection
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=true

server.servlet.session.timeout=24h
spring.session.store-type=jdbc
spring.session.data.jdbc.initialize-schema=never
spring.sql.init.mode=always

# Session cookie hardening — προστατεύει από CSRF (SameSite) και XSS token theft (HttpOnly).
# Το secure=true απαιτεί HTTPS — κράτησέ το false σε local dev αν δεν τρέχεις TLS.
server.servlet.session.cookie.same-site=strict
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
